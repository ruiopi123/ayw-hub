<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Ayw-Hub 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ayw: '#00f2ff' }, fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="font-black text-xl tracking-tighter flex items-center gap-2">
                <div class="w-6 h-6 bg-slate-900 rounded flex items-center justify-center"><span class="text-ayw text-[10px]">A</span></div>
                Ayw-Hub <span class="text-slate-400 font-normal text-xs ml-2">Admin</span>
            </a>
            <nav class="text-sm font-bold text-slate-500 flex gap-6">
                <a href="index.html" class="hover:text-slate-900 transition">Explorer</a>
                <a href="admin.html" class="text-slate-900 border-b-2 border-slate-900">Management</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-black italic mb-2">Library Control</h2>
                <p class="text-slate-500 font-medium text-sm">登録済みライブラリの編集と削除を行います。</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-xl border border-slate-200 text-xs font-bold text-slate-400">
                TOTAL: <span id="total-count" class="text-slate-900">0</span>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900 text-white text-[11px] uppercase tracking-widest font-black">
                        <th class="px-8 py-5">Library Name</th>
                        <th class="px-8 py-5">Ver</th>
                        <th class="px-8 py-5">Author</th>
                        <th class="px-8 py-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-list" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // --- 設定 (ここを書き換えてください) ---
        const SUPABASE_URL = 'https://akjkmhudptpkdkfrkmzl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFramttaHVkcHRwa2RrZnJrbXpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzI4NDcsImV4cCI6MjA4NzI0ODg0N30.Ne78IRYI2hwike1tZu4mS73hJh5R6waYDGM7FgLexyE';
        const ADMIN_PASSWORD = 'ayw'; // ← あなたが使う管理用パスワード

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchAdminList() {
            const { data, error } = await db.from('libraries').select('*').order('name', { ascending: true });
            if (error) return alert('エラー: ' + error.message);
            
            const container = document.getElementById('admin-list');
            document.getElementById('total-count').textContent = data.length;
            container.innerHTML = '';

            data.forEach(lib => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/50 transition-colors group";
                tr.innerHTML = `
                    <td class="px-8 py-6">
                        <div class="font-bold text-slate-900 group-hover:text-ayw transition-colors">${lib.name}</div>
                        <div class="text-[10px] text-slate-400 mt-1 truncate max-w-[200px]">${lib.description}</div>
                    </td>
                    <td class="px-8 py-6 font-mono text-xs text-slate-500">v${lib.version}</td>
                    <td class="px-8 py-6 text-sm text-slate-600">${lib.author}</td>
                    <td class="px-8 py-6 text-right space-x-2">
                        <button onclick="deleteLib('${lib.id}', '${lib.name}')" class="text-[11px] font-black text-red-400 hover:text-red-600 uppercase tracking-tighter transition">Delete</button>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        // --- 削除機能 ---
        async function deleteLib(id, name) {
            const pass = prompt(`ライブラリ「${name}」を削除しますか？\n削除するには管理パスワードを入力してください：`);
            
            if (pass === ADMIN_PASSWORD) {
                const { error } = await db.from('libraries').delete().eq('id', id);
                if (error) {
                    alert('削除に失敗しました: ' + error.message);
                } else {
                    alert('削除しました。');
                    fetchAdminList();
                }
            } else if (pass !== null) {
                alert('パスワードが違います。');
            }
        }

        fetchAdminList();
    </script>
</body>
</html>
