<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ayw-Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { ayw: '#00f2ff' },
                    fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f9fafb; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .auth-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-focus:focus { ring: 4px rgba(0, 242, 255, 0.15); border-color: #00f2ff; }
    </style>
</head>
<body class="text-slate-900 antialiased min-h-screen flex flex-col">

    <header class="glass border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center shadow-lg shadow-slate-200">
                    <span class="text-ayw font-black text-sm">A</span>
                </div>
                <a href="index.html" class="font-black tracking-tighter text-xl">Ayw-Hub<span class="text-slate-300 font-light ml-0.5">.space</span></a>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="auth-card w-full max-w-md bg-white border border-slate-100 rounded-[2.5rem] shadow-2xl p-10">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black tracking-tight mb-2">Welcome Back</h2>
                <p class="text-slate-400 text-sm font-medium">パッケージの管理を始めましょう</p>
            </div>

            <div class="flex p-1 bg-slate-100 rounded-2xl mb-8">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-white shadow-sm text-slate-900">ログイン</button>
                <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-400 hover:text-slate-600">新規登録</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-1">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none transition-all input-focus">
                </div>
                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none transition-all input-focus">
                </div>

                <div id="msg-box" class="text-xs font-bold text-center py-2 hidden"></div>

                <button id="submit-btn" onclick="handleSubmit()" class="w-full py-5 bg-slate-900 text-ayw font-black rounded-2xl shadow-xl shadow-slate-200 hover:scale-[1.02] active:scale-[0.98] transition-all mt-4">
                    ログインする
                </button>
            </div>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-xs font-bold text-slate-300 hover:text-slate-400 transition italic">← Back to Explore</a>
            </div>
        </div>
    </main>

    <script>
        // --- 設定 (Supabase) ---
        const SUPABASE_URL = 'https://akjkmhudptpkdkfrkmzl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFramttaHVkcHRwa2RrZnJrbXpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzI4NDcsImV4cCI6MjA4NzI0ODg0N30.Ne78IRYI2hwike1tZu4mS73hJh5R6waYDGM7FgLexyE';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            const isLogin = mode === 'login';
            
            // UI Switch
            document.getElementById('tab-login').className = isLogin ? "flex-1 py-2 text-sm font-bold rounded-xl bg-white shadow-sm text-slate-900" : "flex-1 py-2 text-sm font-bold rounded-xl text-slate-400 hover:text-slate-600";
            document.getElementById('tab-signup').className = !isLogin ? "flex-1 py-2 text-sm font-bold rounded-xl bg-white shadow-sm text-slate-900" : "flex-1 py-2 text-sm font-bold rounded-xl text-slate-400 hover:text-slate-600";
            document.getElementById('submit-btn').textContent = isLogin ? "ログインする" : "アカウントを作成";
            document.querySelector('h2').textContent = isLogin ? "Welcome Back" : "Join Ayw-Hub";
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg-box');
            const btn = document.getElementById('submit-btn');

            if (!email || !password) return alert("入力してください");

            btn.disabled = true;
            btn.opacity = "0.5";
            msgBox.classList.remove('hidden');
            msgBox.className = "text-xs font-bold text-center py-2 text-slate-400 animate-pulse";
            msgBox.textContent = "処理中...";

            try {
                if (currentMode === 'login') {
                    const { error } = await db.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    location.href = 'index.html';
                } else {
                    const { error } = await db.auth.signUp({ email, password });
                    if (error) throw error;
                    msgBox.className = "text-xs font-bold text-center py-2 text-green-500";
                    msgBox.textContent = "確認メールを送信しました。チェックしてください！";
                }
            } catch (err) {
                msgBox.className = "text-xs font-bold text-center py-2 text-red-400";
                msgBox.textContent = "Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.opacity = "1";
            }
        }
    </script>
</body>
</html>
