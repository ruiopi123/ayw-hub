<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish | Ayw-Hub アップロード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ayw: '#00f2ff' }, fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] } } } }
    </script>
    <style>
        .drop-zone { border: 2px dashed #e2e8f0; transition: all 0.3s; }
        .drop-zone:hover { border-color: #00f2ff; background: #f0fdfa; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="font-black text-xl tracking-tighter flex items-center gap-2 text-slate-900">
                <div class="w-6 h-6 bg-slate-900 rounded flex items-center justify-center"><span class="text-ayw text-[10px]">A</span></div>
                Ayw-Hub
            </a>
            <nav class="text-sm font-bold text-slate-500 flex gap-6 italic">
                <a href="index.html" class="hover:text-slate-900">Explorer</a>
                <a href="publish.html" class="text-slate-900 border-b-2 border-ayw">Publish</a>
            </nav>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-16">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100">
            <h2 class="text-3xl font-black mb-2 italic">Deploy your Logic.</h2>
            <p class="text-slate-400 mb-10 font-medium text-sm">ZIP形式のライブラリを直接アップロードできます。</p>

            <form id="publish-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Library Name</label>
                    <input type="text" id="name" required pattern="^[a-z0-9-]+$" 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-ayw/10 focus:border-ayw outline-none transition-all font-mono font-bold"
                        placeholder="example-lib">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Version</label>
                        <input type="text" id="version" required placeholder="1.0.0" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Author</label>
                        <input type="text" id="author" required placeholder="Your Name" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Package File (.zip)</label>
                    <div class="drop-zone p-8 rounded-2xl text-center cursor-pointer relative bg-slate-50">
                        <input type="file" id="file-input" accept=".zip" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div id="file-label" class="text-sm font-bold text-slate-400">
                            ここにZIPファイルをドラッグ＆ドロップ<br>
                            <span class="text-[10px] font-normal tracking-normal">(またはクリックして選択)</span>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Description</label>
                    <textarea id="desc" rows="3" required placeholder="ライブラリの概要を教えてください" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm"></textarea>
                </div>
                
                <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-black hover:shadow-2xl shadow-slate-300 transition-all active:scale-95">
                    アップロードして公開
                </button>
            </form>
            <div id="message" class="mt-8 text-center text-sm font-bold hidden"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://akjkmhudptpkdkfrkmzl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFramttaHVkcHRwa2RrZnJrbXpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzI4NDcsImV4cCI6MjA4NzI0ODg0N30.Ne78IRYI2hwike1tZu4mS73hJh5R6waYDGM7FgLexyE';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ファイル名表示の切り替え
        document.getElementById('file-input').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                document.getElementById('file-label').innerHTML = `<span class="text-ayw font-black">✓</span> ${fileName}`;
                document.getElementById('file-label').classList.replace('text-slate-400', 'text-slate-900');
            }
        });

        document.getElementById('publish-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('message');
            const file = document.getElementById('file-input').files[0];
            
            btn.disabled = true;
            btn.textContent = 'Uploading...';
            msg.className = 'mt-8 text-center text-sm font-bold block text-slate-500 animate-pulse';
            msg.textContent = 'ファイルを転送中...';

            try {
                const libName = document.getElementById('name').value.toLowerCase();
                const filePath = `${libName}-${Date.now()}.zip`;

                // 1. Storageにアップロード
                const { data: uploadData, error: uploadError } = await db.storage
                    .from('packages')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                // 2. 公開URLを取得
                const { data: urlData } = db.storage.from('packages').getPublicUrl(filePath);
                const publicUrl = urlData.publicUrl;

                // 3. データベースに情報を登録
                const { error: dbError } = await db.from('libraries').insert([{
                    name: libName,
                    version: document.getElementById('version').value,
                    author: document.getElementById('author').value,
                    download_url: publicUrl,
                    description: document.getElementById('desc').value
                }]);

                if (dbError) throw dbError;

                msg.textContent = '🎉 公開に成功しました！Explorerを確認してください。';
                msg.className = 'mt-8 text-center text-sm font-bold block text-green-500';
                document.getElementById('publish-form').reset();
                document.getElementById('file-label').innerHTML = 'ここにZIPファイルをドラッグ＆ドロップ';
                
            } catch (err) {
                msg.textContent = 'エラー: ' + err.message;
                msg.className = 'mt-8 text-center text-sm font-bold block text-red-500';
            } finally {
                btn.disabled = false;
                btn.textContent = 'アップロードして公開';
            }
        });
    </script>
</body>
</html>
